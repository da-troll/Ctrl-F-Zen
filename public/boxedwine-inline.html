<!doctype html>
<html lang="en-us">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>BoxedWine - TrackWords</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      #controls {
        padding: 10px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
      }
      button {
        background: #4a5568;
        color: white;
        border: none;
        padding: 8px 16px;
        margin-right: 8px;
        cursor: pointer;
        border-radius: 4px;
      }
      button:hover {
        background: #5a6678;
      }
      #canvas {
        display: block;
        width: 100%;
        height: calc(100vh - 60px);
        background: #000;
      }
      #status {
        padding: 10px;
        background: #2a2a2a;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button id="uploadbtn" onclick="document.getElementById('upload').click()">📁 Add TrackWords.exe</button>
      <input style="display: none" id="upload" name="upload" onchange="startWithFiles(event.target.files);" type="file" accept=".exe" />
      <span id="status">Ready - Click "Add TrackWords.exe" to upload the game</span>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <!-- Stub elements required by boxedwine-shell.js -->
    <div id="dropzone" style="display: none;"></div>
    <div id="spinner" style="display: none;"></div>
    <div id="progress" style="display: none;"></div>
    <button id="startbtn" style="display: none;"></button>
    <button id="downloadbtn" style="display: none;"></button>
    <input id="soundToggle" type="checkbox" style="display: none;" />
    <div id="sound-checkbox" style="display: none;"></div>
    <button id="inline-runbtn" style="display: none;"></button>
    <div id="inline" style="display: none;"></div>

    <script type="text/javascript" src="/boxedwine-browserfs.min.js"></script>
    <script type="text/javascript" src="/boxedwine-jszip.min.js"></script>
    <script type="text/javascript" src="/boxedwine-shell.js"></script>
    <script>
      // Wait for shell.js to load and define Config
      window.addEventListener('DOMContentLoaded', function() {
        // Config is defined by shell.js, so we need to wait for it
        var checkConfig = setInterval(function() {
          if (typeof Config !== 'undefined') {
            clearInterval(checkConfig);
            // Configure for inline mode
            Config.isRunningInline = true;
            Config.showUploadDownload = true;
            Config.urlParams = "";
            Config.dirPrefix = "/root/home/username/files/";
            Config.appZipFile = "files.zip";
            Config.rootZipFile = "boxedwine_full.zip";
            Config.isAutoRunSet = true;
            Config.isSoundEnabled = true;
            Config.isZlibEnabled = false;
            Config.retrieveDlls = false;
            Config.bpp = 32;
            Config.extraZipFiles = "";
            Config.Program = "explorer.exe";
            Config.WorkingDir = "";
            document.getElementById('status').textContent = 'Boxedwine ready - upload TrackWords.exe to begin';
          }
        }, 100);
      });
    </script>
    <script async type="text/javascript" src="/boxedwine.js"></script>
  </body>
</html>
